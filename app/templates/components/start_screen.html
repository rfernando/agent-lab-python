<div id="game-container">
    <div class="mission-panel">
        <div class="start-screen">
            <section class="hero-card">
                <h1 class="hero-title">Soc Ops</h1>
                <p class="mission-kicker">Briefing // Social Bingo Protocol</p>
                <p class="hero-subtitle">
                    Scan the room, connect with people, and complete your objective grid before anyone else.
                </p>
            </section>

            <section class="rules-card">
                <h2 class="rules-title">How to play</h2>
                <ul class="rules-list">
                    <li>Locate people who match each square prompt.</li>
                    <li>Tap a square to confirm each successful contact.</li>
                    <li>Complete 5 in a row to trigger mission success.</li>
                </ul>
            </section>

            <button hx-post="/start" hx-target="#game-container" hx-swap="outerHTML"
                class="command-btn command-btn-primary">
                Start Game
            </button>
        </div>
    </div>
</div>
