<div id="game-container">
    <div class="mission-panel">
        <header class="mission-header">
            <button hx-post="/reset" hx-target="#game-container" hx-swap="outerHTML"
                class="command-btn command-btn-secondary">
                ← Back
            </button>
            <h1 class="mission-brand">Soc Ops</h1>
            <p class="mission-kicker">Live board</p>
        </header>

        <div class="game-grid">
            <p class="status-copy">
                Mark each contact as you meet them. First full line wins the operation.
            </p>

            {% if session.has_bingo %}
            <div class="status-rail">BINGO! You got a line!</div>
            {% endif %}

            {% include "components/bingo_board.html" %}
        </div>
    </div>

    {% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
    {% endif %}
</div>
