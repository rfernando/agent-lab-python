<div id="game-container" class="lp-shell">
    <div class="lp-bg" aria-hidden="true">
        <div class="lp-ring"></div>
        <div class="lp-ring lp-ring--2"></div>
    </div>

    <header class="lp-hero">
        <div class="lp-status-badge">// Mission Active //</div>
        <h1 class="lp-title">Soc Ops</h1>
        <p class="lp-tagline">Find &mdash; Connect &mdash; Complete</p>
    </header>

    <section class="lp-rules">
        <h2 class="lp-rules-label">How to play</h2>
        <ol class="lp-chips">
            <li class="lp-chip">
                <span class="lp-chip-n">01</span>
                <span>Find people matching each square</span>
            </li>
            <li class="lp-chip">
                <span class="lp-chip-n">02</span>
                <span>Tap to confirm each contact</span>
            </li>
            <li class="lp-chip">
                <span class="lp-chip-n">03</span>
                <span>5&nbsp;in&nbsp;a&nbsp;row = Mission complete</span>
            </li>
        </ol>
    </section>

    <div class="lp-cta">
        <button hx-post="/start" hx-target="#game-container" hx-swap="outerHTML"
            class="lp-start-btn">
            Start Game
        </button>
    </div>
</div>
