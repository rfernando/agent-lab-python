<div class="board-wrap">
    <div class="board-grid">
        {% for square in session.board %}
        {% set is_winning = square.id in session.winning_square_ids %}
        <button {% if not square.is_free_space %} hx-post="/toggle/{{ square.id }}" hx-target="#game-container"
            hx-swap="outerHTML" {% endif %} {% if square.is_free_space %}disabled{% endif %}
            class="board-square{% if square.is_marked %}{% if is_winning %} board-square--winning{% else %} board-square--marked{% endif %}{% endif %}{% if square.is_free_space %} board-square--free{% endif %}"
            aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
            aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
            <span>{{ square.text }}</span>
            {% if square.is_marked and not square.is_free_space %}
            <span class="checkmark">✓</span>
            {% endif %}
        </button>
        {% endfor %}
    </div>
</div>
